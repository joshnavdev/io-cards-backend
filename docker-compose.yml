services:
  kafka:
    image: confluentinc/cp-kafka:7.7.1
    container_name: io-kafka
    hostname: kafka
    ports:
      - '9092:9092'
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:29093'
      KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,PLAINTEXT_HOST://0.0.0.0:9092'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
    healthcheck:
      test: ['CMD-SHELL', 'kafka-broker-api-versions --bootstrap-server localhost:9092 || exit 1']
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 30s
    networks:
      - io-net

  card-issuer:
    build:
      context: .
      dockerfile: packages/card-issuer/Dockerfile
    container_name: io-card-issuer
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - '3000:3000'
    environment:
      PORT: 3000
      CORS_ORIGIN: '*'
      LOG_LEVEL: info
      KAFKA_BROKERS: kafka:29092
      KAFKA_CLIENT_ID_ISSUER: io-card-issuer
    networks:
      - io-net

  card-processor:
    build:
      context: .
      dockerfile: packages/card-processor/Dockerfile
    container_name: io-card-processor
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      LOG_LEVEL: info
      KAFKA_BROKERS: kafka:29092
      KAFKA_CLIENT_ID_PROCESSOR: io-card-processor
      KAFKA_GROUP_ID: io-card-processor-group
    networks:
      - io-net

networks:
  io-net:
    driver: bridge
